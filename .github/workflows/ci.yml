name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'

  backend_tests:
    name: Backend - tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run tests
        working-directory: backend
        run: mvn -B -ntp test
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports/**

  backend_quality:
    name: Backend - qualité (coverage)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Verify (incl. JaCoCo)
        working-directory: backend
        run: mvn -B -ntp verify
      - name: Upload coverage + reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-reports
          path: |
            backend/target/site/jacoco/**
            backend/target/surefire-reports/**

  backend_security:
    name: Backend - sécurité (deps)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Cache Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: dependency-check-v2-${{ runner.os }}-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            dependency-check-v2-${{ runner.os }}-
      - name: OWASP Dependency-Check
        working-directory: backend
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NVD_API_KEY:-}" ]; then
            echo "::warning::Secret NVD_API_KEY absent — le NVD limite fortement les requêtes (HTTP 429). Crée une clé sur https://nvd.nist.gov/developers/request-an-api-key puis ajoute-la dans Settings → Secrets → Actions."
          fi
          # Évite une base H2 laissée verrouillée / incohérente après un run interrompu
          rm -f "$HOME/.dependency-check/odc.mv.db.trace.db" 2>/dev/null || true
          mvn -B -ntp -DskipTests \
            org.owasp:dependency-check-maven:12.2.1:check \
            -Dformat=HTML \
            -DfailBuildOnCVSS=7 \
            -DdataDirectory="$HOME/.dependency-check" \
            -DnvdApiDelay=8000 \
            ${NVD_API_KEY:+-DnvdApiKey=$NVD_API_KEY}
      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-dependency-check
          path: |
            backend/target/dependency-check-report.html
            backend/target/dependency-check-report.json
            backend/target/dependency-check-report.xml

  backend_codeql:
    name: Backend - CodeQL
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          source-root: backend
      - name: Build
        working-directory: backend
        run: mvn -B -ntp -DskipTests package
      - name: Analyze
        uses: github/codeql-action/analyze@v3
